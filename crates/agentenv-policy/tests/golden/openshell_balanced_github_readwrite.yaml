version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /etc
  - /lib
  - /usr
  - /var/log
  read_write:
  - /sandbox
  - /tmp
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  rule_0:
    name: rule-0
    endpoints:
    - host: api.github.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: read-only
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/local/bin/codex
    - path: /usr/bin/curl
  rule_1:
    name: rule-1
    endpoints:
    - host: crates.io
      port: 443
      protocol: rest
      enforcement: enforce
      access: read-only
    binaries:
