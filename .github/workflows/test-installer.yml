name: Test Installer

on:
  pull_request:
    paths:
      - install.sh
      - tests/install/**
      - README.md
      - .github/workflows/test-installer.yml
  push:
    branches:
      - main
    paths:
      - install.sh
      - tests/install/**
      - README.md
      - .github/workflows/test-installer.yml

jobs:
  shell-tests:
    name: Installer shell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run installer tests
        run: sh tests/install/test_install.sh
