name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: ${{ matrix.os }} / rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, 1.95.0]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: cargo fmt --check
        run: cargo +${{ matrix.toolchain }} fmt --check
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo +${{ matrix.toolchain }} clippy --workspace --all-targets -- -D warnings
      - name: cargo test --workspace
        run: cargo +${{ matrix.toolchain }} test --workspace
      - name: cargo build --workspace --all-targets --release
        run: cargo +${{ matrix.toolchain }} build --workspace --all-targets --release
