# Reference blueprint - Claude Code in OpenShell with a generic MCP context server.
# Good for: connecting Claude to any MCP-compatible knowledge service.
#
# Prerequisites:
#   export ANTHROPIC_API_KEY=sk-ant-example
#   export MCP_URL=https://example.com/mcp
#   export MCP_TOKEN=mcp-token-example
#
# Usage:
#   agentenv create docs --blueprint blueprints/claude+mcp-generic+openshell.yaml
#   agentenv enter docs

version: 0.1.0
min_agentenv_version: 0.0.1-alpha0

sandbox:
  driver: openshell
  version: ">=0.0.1-alpha0,<0.1"

agent:
  driver: claude
  credentials:
    ANTHROPIC_API_KEY:
      source: env
      required: true

context:
  driver: mcp-generic
  endpoint:
    url: ${MCP_URL}
    transport: http+sse
  credentials:
    MCP_TOKEN:
      source: env
      required: true

inference:
  driver: passthrough

policy:
  tier: restricted
  presets: []
  overrides:
    - allow: "${MCP_URL}"
  # mcp:
  #   confused_deputy_guards:
  #     enabled: true
  #     default_approval: per-call
  #     tool_policies:
  #       "web.fetch":
  #         approval: per-call
  #         url_allowlist:
  #           - api.github.com
  #         redact_args: true
  #     cross_tool_flows:
  #       forbid_read_to_write_turns: 5

state:
  persist_home: true
