# Reference blueprint — OpenClaw in OpenShell with a shared Nexus hub.
# Comparable to an end-to-end secure-agent-runtime deployment with shared company context.
#
# Usage:
#   export NEXUS_HUB_URL=https://nexus.company.com
#   export NEXUS_TOKEN=...
#   agentenv create assistant --blueprint blueprints/openclaw+nexus+openshell.yaml

version: 0.1.0
min_agentenv_version: 0.0.1-alpha0

sandbox:
  driver: openshell
  version: ">=0.0.1-alpha0,<0.1"

agent:
  driver: openclaw
  config:
    provider: openai
  credentials:
    OPENAI_API_KEY:
      source: env
      required: true

context:
  driver: nexus
  mode: hub
  hub_url: ${NEXUS_HUB_URL}
  credentials:
    NEXUS_TOKEN:
      source: env
      required: true

inference:
  driver: passthrough

policy:
  tier: balanced
  presets:
    - github_read
    - npm_read
  overrides:
    - allow: "${NEXUS_HUB_URL}"

state:
  persist_home: true            # OpenClaw's always-on assistant state lives here
